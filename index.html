<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crop Transparent Borders</title>
<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #222;
    color: white;
    text-align: center;
    padding: 30px;
}

h2 {
    margin-bottom: 5px;
}

.subtitle {
    color: #aaa;
    margin-top: 0;
    font-size: 14px;
}

.controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
}

.dropzone {
    border: 2px dashed #666;
    border-radius: 8px;
    padding: 30px;
    margin: 15px auto;
    max-width: 500px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
}

.dropzone:hover,
.dropzone.dragover {
    border-color: #4da3ff;
    background: rgba(77, 163, 255, 0.08);
}

.dropzone input {
    display: none;
}

label.slider-label {
    display: flex;
    align-items: center;
    gap: 8px;
}

input[type=range] {
    width: 250px;
}

input[type=text]#filename {
    padding: 6px 10px;
    font-size: 14px;
    border: 1px solid #666;
    border-radius: 4px;
    background: #333;
    color: white;
}

#filenameExt {
    color: #aaa;
    font-size: 14px;
}

.canvas-wrap {
    display: inline-block;
    vertical-align: top;
    margin: 15px;
}

canvas {
    display: block;
    border: 1px solid #666;
    max-width: 100%;
    height: auto;
    background:
        linear-gradient(45deg,#bbb 25%,transparent 25%),
        linear-gradient(-45deg,#bbb 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#bbb 75%),
        linear-gradient(-45deg,transparent 75%,#bbb 75%);
    background-size:20px 20px;
    background-position:0 0,0 10px,10px -10px,-10px 0;
}

.dimensions {
    color: #aaa;
    font-size: 13px;
    margin-top: 4px;
}

.size-info {
    color: #aaa;
    font-size: 13px;
    margin-top: 4px;
}

.size-info .smaller {
    color: #7be36b;
}

.size-info .bigger {
    color: #ff8f6b;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #4da3ff;
    color: #111;
    font-weight: bold;
    transition: background 0.2s, opacity 0.2s;
}

button:hover:not(:disabled) {
    background: #71b7ff;
}

button:disabled {
    background: #555;
    color: #999;
    cursor: not-allowed;
}

.status {
    min-height: 22px;
    color: #ffb84d;
    font-size: 14px;
}

.status.error {
    color: #ff6b6b;
}
</style>
</head>
<body>

<h2>Crop Transparent Borders</h2>
<p class="subtitle">Trim transparent padding from the edges of an image, right in your browser.</p>

<div class="dropzone" id="dropzone">
    <p>Drag &amp; drop an image here, or click to choose a file</p>
    <input type="file" id="file" accept="image/*">
</div>

<div class="controls">
    <label class="slider-label">
        Alpha Threshold:
        <input type="range" id="threshold" min="0" max="255" value="1">
        <span id="value">1</span>
    </label>
</div>

<div class="controls">
    <label class="slider-label">
        Max Size (px):
        <input type="range" id="resizeSlider" min="1" max="1" value="1" disabled>
        <span id="resizeValue">-</span>
    </label>
    <label class="slider-label">
        Quality:
        <input type="range" id="qualitySlider" min="1" max="100" value="100" disabled>
        <span id="qualityValue">100%</span>
    </label>
</div>

<div class="controls">
    <button id="cropBtn" disabled>Crop</button>
    <label class="slider-label" for="filename">File name:</label>
    <input type="text" id="filename" placeholder="cropped" disabled>
    <span id="filenameExt"></span>
    <button id="downloadBtn" disabled>Download</button>
</div>

<p class="status" id="status"></p>

<div class="canvas-wrap">
    <h3>Original</h3>
    <canvas id="source"></canvas>
    <div class="dimensions" id="sourceDims"></div>
</div>

<div class="canvas-wrap">
    <h3>Cropped</h3>
    <canvas id="output"></canvas>
    <div class="dimensions" id="outputDims"></div>
    <div class="size-info" id="sizeInfo"></div>
</div>

<script>
(() => {
    const fileInput = document.getElementById("file");
    const dropzone = document.getElementById("dropzone");
    const sourceCanvas = document.getElementById("source");
    const outputCanvas = document.getElementById("output");
    const cropBtn = document.getElementById("cropBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const thresholdSlider = document.getElementById("threshold");
    const thresholdValue = document.getElementById("value");
    const statusEl = document.getElementById("status");
    const sourceDims = document.getElementById("sourceDims");
    const outputDims = document.getElementById("outputDims");
    const filenameInput = document.getElementById("filename");
    const filenameExt = document.getElementById("filenameExt");
    const resizeSlider = document.getElementById("resizeSlider");
    const resizeValue = document.getElementById("resizeValue");
    const qualitySlider = document.getElementById("qualitySlider");
    const qualityValue = document.getElementById("qualityValue");
    const sizeInfo = document.getElementById("sizeInfo");

    const srcCtx = sourceCanvas.getContext("2d", { willReadFrequently: true });
    const outCtx = outputCanvas.getContext("2d");

    // Offscreen canvas holding the full-resolution crop, before the resize slider scales it down.
    const cropSourceCanvas = document.createElement("canvas");
    const cropSourceCtx = cropSourceCanvas.getContext("2d");

    // Canvas can only reliably re-encode to these formats; anything else falls back to PNG.
    const SUPPORTED_EXPORT_TYPES = {
        "image/png": "png",
        "image/jpeg": "jpg",
        "image/webp": "webp"
    };

    let loaded = false;
    let objectUrl = null;
    let exportBaseMimeType = "image/png";
    let originalFileSize = 0;
    let sizeUpdateTimer = null;

    function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
    }

    function resetOutput() {
        outputCanvas.width = 0;
        outputCanvas.height = 0;
        cropSourceCanvas.width = 0;
        cropSourceCanvas.height = 0;
        outputDims.textContent = "";
        sizeInfo.textContent = "";
        downloadBtn.disabled = true;
        resizeSlider.disabled = true;
        qualitySlider.disabled = true;
    }

    function formatSize(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    // Quality only has an effect on lossy formats. A PNG source switches to WebP
    // once quality is turned down, since PNG itself has no lossy quality setting.
    function getExportFormat() {
        const quality = Number(qualitySlider.value) / 100;
        let mimeType = exportBaseMimeType;

        if (mimeType === "image/png" && quality < 1) {
            mimeType = "image/webp";
        }

        const ext = SUPPORTED_EXPORT_TYPES[mimeType] || "png";
        return { mimeType, ext, quality };
    }

    function renderOutput() {
        if (cropSourceCanvas.width === 0) return;

        const maxDim = Math.max(cropSourceCanvas.width, cropSourceCanvas.height);
        const targetMax = Number(resizeSlider.value);
        const scale = Math.min(1, targetMax / maxDim);
        const outWidth = Math.max(1, Math.round(cropSourceCanvas.width * scale));
        const outHeight = Math.max(1, Math.round(cropSourceCanvas.height * scale));

        outputCanvas.width = outWidth;
        outputCanvas.height = outHeight;
        outCtx.clearRect(0, 0, outWidth, outHeight);
        outCtx.drawImage(
            cropSourceCanvas,
            0, 0, cropSourceCanvas.width, cropSourceCanvas.height,
            0, 0, outWidth, outHeight
        );

        outputDims.textContent = `${outWidth} x ${outHeight}px`;
        downloadBtn.disabled = false;

        scheduleSizeUpdate();
    }

    function scheduleSizeUpdate() {
        clearTimeout(sizeUpdateTimer);
        sizeUpdateTimer = setTimeout(updateSizeComparison, 150);
    }

    function updateSizeComparison() {
        if (outputCanvas.width === 0) return;

        const { mimeType, ext, quality } = getExportFormat();
        filenameExt.textContent = `.${ext}`;

        outputCanvas.toBlob(blob => {
            if (!blob) {
                sizeInfo.textContent = "";
                return;
            }

            let comparison = "";
            if (originalFileSize > 0) {
                const pct = Math.round((blob.size / originalFileSize) * 100);
                const cls = blob.size < originalFileSize ? "smaller" : "bigger";
                comparison = ` (<span class="${cls}">${pct}% of original</span>)`;
            }

            sizeInfo.innerHTML =
                `Original: ${formatSize(originalFileSize)} &rarr; Output: ${formatSize(blob.size)}${comparison}`;
        }, mimeType, mimeType === "image/png" ? undefined : quality);
    }

    thresholdSlider.oninput = () => {
        thresholdValue.textContent = thresholdSlider.value;
    };

    resizeSlider.oninput = () => {
        resizeValue.textContent = resizeSlider.value;
        renderOutput();
    };

    qualitySlider.oninput = () => {
        qualityValue.textContent = `${qualitySlider.value}%`;
        scheduleSizeUpdate();
    };

    function loadFile(file) {
        if (!file) return;

        if (!file.type.startsWith("image/")) {
            setStatus("Please choose a valid image file.", true);
            return;
        }

        if (objectUrl) {
            URL.revokeObjectURL(objectUrl);
        }

        const img = new Image();
        objectUrl = URL.createObjectURL(file);

        img.onload = () => {
            sourceCanvas.width = img.width;
            sourceCanvas.height = img.height;
            srcCtx.clearRect(0, 0, img.width, img.height);
            srcCtx.drawImage(img, 0, 0);
            sourceDims.textContent = `${img.width} x ${img.height}px`;
            loaded = true;
            cropBtn.disabled = false;
            resetOutput();
            setStatus("");

            originalFileSize = file.size;
            exportBaseMimeType = SUPPORTED_EXPORT_TYPES[file.type] ? file.type : "image/png";

            const baseName = file.name.replace(/\.[^./\\]+$/, "") || "image";
            filenameInput.value = `${baseName}_cropped`;
            filenameInput.disabled = false;
            filenameExt.textContent = `.${SUPPORTED_EXPORT_TYPES[exportBaseMimeType]}`;

            qualitySlider.value = 100;
            qualityValue.textContent = "100%";
        };

        img.onerror = () => {
            setStatus("Could not load that image. It may be corrupt or an unsupported format.", true);
            loaded = false;
            cropBtn.disabled = true;
        };

        img.src = objectUrl;
    }

    fileInput.onchange = e => {
        loadFile(e.target.files[0]);
    };

    dropzone.onclick = () => fileInput.click();

    dropzone.ondragover = e => {
        e.preventDefault();
        dropzone.classList.add("dragover");
    };

    dropzone.ondragleave = () => {
        dropzone.classList.remove("dragover");
    };

    dropzone.ondrop = e => {
        e.preventDefault();
        dropzone.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (file) loadFile(file);
    };

    cropBtn.onclick = () => {
        if (!loaded) return;

        const threshold = Number(thresholdSlider.value);
        const width = sourceCanvas.width;
        const height = sourceCanvas.height;

        let pixels;
        try {
            pixels = srcCtx.getImageData(0, 0, width, height);
        } catch (err) {
            setStatus("Could not read image data (the image may be from a restricted source).", true);
            return;
        }

        const data = pixels.data;

        let minX = width;
        let minY = height;
        let maxX = -1;
        let maxY = -1;

        for (let y = 0; y < height; y++) {
            const rowOffset = y * width;
            for (let x = 0; x < width; x++) {
                const alpha = data[(rowOffset + x) * 4 + 3];

                if (alpha > threshold) {
                    if (x < minX) minX = x;
                    if (y < minY) minY = y;
                    if (x > maxX) maxX = x;
                    if (y > maxY) maxY = y;
                }
            }
        }

        if (maxX === -1) {
            setStatus("Image is completely transparent at this threshold — nothing to crop.", true);
            resetOutput();
            return;
        }

        const cropWidth = maxX - minX + 1;
        const cropHeight = maxY - minY + 1;

        cropSourceCanvas.width = cropWidth;
        cropSourceCanvas.height = cropHeight;
        cropSourceCtx.clearRect(0, 0, cropWidth, cropHeight);
        cropSourceCtx.drawImage(
            sourceCanvas,
            minX, minY, cropWidth, cropHeight,
            0, 0, cropWidth, cropHeight
        );

        const maxDim = Math.max(cropWidth, cropHeight);
        resizeSlider.min = Math.min(50, maxDim);
        resizeSlider.max = maxDim;
        resizeSlider.value = maxDim;
        resizeSlider.disabled = false;
        resizeValue.textContent = maxDim;
        qualitySlider.disabled = false;

        renderOutput();

        if (minX === 0 && minY === 0 && maxX === width - 1 && maxY === height - 1) {
            setStatus("No transparent borders found — image was already tight.");
        } else {
            setStatus("Cropped successfully.");
        }
    };

    downloadBtn.onclick = () => {
        if (outputCanvas.width === 0) return;

        const { mimeType, ext, quality } = getExportFormat();
        const typedName = filenameInput.value.trim().replace(/[\\/:*?"<>|]/g, "");
        const baseName = typedName || "cropped";

        outputCanvas.toBlob(blob => {
            if (!blob) {
                setStatus("Could not export the cropped image.", true);
                return;
            }
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.download = `${baseName}.${ext}`;
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
        }, mimeType, mimeType === "image/png" ? undefined : quality);
    };
})();
</script>

</body>
</html>
