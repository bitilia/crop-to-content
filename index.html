<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crop Transparent Borders</title>
<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #222;
    color: white;
    text-align: center;
    padding: 30px;
}

h2 {
    margin-bottom: 5px;
}

.subtitle {
    color: #aaa;
    margin-top: 0;
    font-size: 14px;
}

.controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
}

.dropzone {
    border: 2px dashed #666;
    border-radius: 8px;
    padding: 30px;
    margin: 15px auto;
    max-width: 500px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
}

.dropzone:hover,
.dropzone.dragover {
    border-color: #4da3ff;
    background: rgba(77, 163, 255, 0.08);
}

.dropzone input {
    display: none;
}

label.slider-label {
    display: flex;
    align-items: center;
    gap: 8px;
}

input[type=range] {
    width: 250px;
}

.canvas-wrap {
    display: inline-block;
    vertical-align: top;
    margin: 15px;
}

canvas {
    display: block;
    border: 1px solid #666;
    max-width: 100%;
    height: auto;
    background:
        linear-gradient(45deg,#bbb 25%,transparent 25%),
        linear-gradient(-45deg,#bbb 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#bbb 75%),
        linear-gradient(-45deg,transparent 75%,#bbb 75%);
    background-size:20px 20px;
    background-position:0 0,0 10px,10px -10px,-10px 0;
}

.dimensions {
    color: #aaa;
    font-size: 13px;
    margin-top: 4px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #4da3ff;
    color: #111;
    font-weight: bold;
    transition: background 0.2s, opacity 0.2s;
}

button:hover:not(:disabled) {
    background: #71b7ff;
}

button:disabled {
    background: #555;
    color: #999;
    cursor: not-allowed;
}

.status {
    min-height: 22px;
    color: #ffb84d;
    font-size: 14px;
}

.status.error {
    color: #ff6b6b;
}
</style>
</head>
<body>

<h2>Crop Transparent Borders</h2>
<p class="subtitle">Trim transparent padding from the edges of an image, right in your browser.</p>

<div class="dropzone" id="dropzone">
    <p>Drag &amp; drop an image here, or click to choose a file</p>
    <input type="file" id="file" accept="image/*">
</div>

<div class="controls">
    <label class="slider-label">
        Alpha Threshold:
        <input type="range" id="threshold" min="0" max="255" value="1">
        <span id="value">1</span>
    </label>
</div>

<div class="controls">
    <button id="cropBtn" disabled>Crop</button>
    <button id="downloadBtn" disabled>Download</button>
</div>

<p class="status" id="status"></p>

<div class="canvas-wrap">
    <h3>Original</h3>
    <canvas id="source"></canvas>
    <div class="dimensions" id="sourceDims"></div>
</div>

<div class="canvas-wrap">
    <h3>Cropped</h3>
    <canvas id="output"></canvas>
    <div class="dimensions" id="outputDims"></div>
</div>

<script>
(() => {
    const fileInput = document.getElementById("file");
    const dropzone = document.getElementById("dropzone");
    const sourceCanvas = document.getElementById("source");
    const outputCanvas = document.getElementById("output");
    const cropBtn = document.getElementById("cropBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const thresholdSlider = document.getElementById("threshold");
    const thresholdValue = document.getElementById("value");
    const statusEl = document.getElementById("status");
    const sourceDims = document.getElementById("sourceDims");
    const outputDims = document.getElementById("outputDims");

    const srcCtx = sourceCanvas.getContext("2d", { willReadFrequently: true });
    const outCtx = outputCanvas.getContext("2d");

    let loaded = false;
    let objectUrl = null;

    function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
    }

    function resetOutput() {
        outputCanvas.width = 0;
        outputCanvas.height = 0;
        outputDims.textContent = "";
        downloadBtn.disabled = true;
    }

    thresholdSlider.oninput = () => {
        thresholdValue.textContent = thresholdSlider.value;
    };

    function loadFile(file) {
        if (!file) return;

        if (!file.type.startsWith("image/")) {
            setStatus("Please choose a valid image file.", true);
            return;
        }

        if (objectUrl) {
            URL.revokeObjectURL(objectUrl);
        }

        const img = new Image();
        objectUrl = URL.createObjectURL(file);

        img.onload = () => {
            sourceCanvas.width = img.width;
            sourceCanvas.height = img.height;
            srcCtx.clearRect(0, 0, img.width, img.height);
            srcCtx.drawImage(img, 0, 0);
            sourceDims.textContent = `${img.width} x ${img.height}px`;
            loaded = true;
            cropBtn.disabled = false;
            resetOutput();
            setStatus("");
        };

        img.onerror = () => {
            setStatus("Could not load that image. It may be corrupt or an unsupported format.", true);
            loaded = false;
            cropBtn.disabled = true;
        };

        img.src = objectUrl;
    }

    fileInput.onchange = e => {
        loadFile(e.target.files[0]);
    };

    dropzone.onclick = () => fileInput.click();

    dropzone.ondragover = e => {
        e.preventDefault();
        dropzone.classList.add("dragover");
    };

    dropzone.ondragleave = () => {
        dropzone.classList.remove("dragover");
    };

    dropzone.ondrop = e => {
        e.preventDefault();
        dropzone.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (file) loadFile(file);
    };

    cropBtn.onclick = () => {
        if (!loaded) return;

        const threshold = Number(thresholdSlider.value);
        const width = sourceCanvas.width;
        const height = sourceCanvas.height;

        let pixels;
        try {
            pixels = srcCtx.getImageData(0, 0, width, height);
        } catch (err) {
            setStatus("Could not read image data (the image may be from a restricted source).", true);
            return;
        }

        const data = pixels.data;

        let minX = width;
        let minY = height;
        let maxX = -1;
        let maxY = -1;

        for (let y = 0; y < height; y++) {
            const rowOffset = y * width;
            for (let x = 0; x < width; x++) {
                const alpha = data[(rowOffset + x) * 4 + 3];

                if (alpha > threshold) {
                    if (x < minX) minX = x;
                    if (y < minY) minY = y;
                    if (x > maxX) maxX = x;
                    if (y > maxY) maxY = y;
                }
            }
        }

        if (maxX === -1) {
            setStatus("Image is completely transparent at this threshold — nothing to crop.", true);
            resetOutput();
            return;
        }

        const cropWidth = maxX - minX + 1;
        const cropHeight = maxY - minY + 1;

        outputCanvas.width = cropWidth;
        outputCanvas.height = cropHeight;

        outCtx.clearRect(0, 0, cropWidth, cropHeight);
        outCtx.drawImage(
            sourceCanvas,
            minX, minY, cropWidth, cropHeight,
            0, 0, cropWidth, cropHeight
        );

        outputDims.textContent = `${cropWidth} x ${cropHeight}px`;
        downloadBtn.disabled = false;

        if (minX === 0 && minY === 0 && maxX === width - 1 && maxY === height - 1) {
            setStatus("No transparent borders found — image was already tight.");
        } else {
            setStatus("Cropped successfully.");
        }
    };

    downloadBtn.onclick = () => {
        if (outputCanvas.width === 0) return;

        outputCanvas.toBlob(blob => {
            if (!blob) {
                setStatus("Could not export the cropped image.", true);
                return;
            }
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.download = "cropped.png";
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
        }, "image/png");
    };
})();
</script>

</body>
</html>
