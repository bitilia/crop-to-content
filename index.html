<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crop Transparent Borders</title>
<style>
* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #222;
    color: white;
    text-align: center;
    padding: 30px;
}

h2 {
    margin-bottom: 5px;
}

.subtitle {
    color: #aaa;
    margin-top: 0;
    font-size: 14px;
}

.dropzone {
    border: 2px dashed #666;
    border-radius: 8px;
    padding: 30px;
    margin: 15px auto;
    max-width: 500px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
}

.dropzone:hover,
.dropzone.dragover {
    border-color: #4da3ff;
    background: rgba(77, 163, 255, 0.08);
}

.dropzone input {
    display: none;
}

.pipeline {
    max-width: 560px;
    margin: 25px auto;
    text-align: left;
}

.step {
    border: 1px solid #444;
    border-radius: 8px;
    margin-bottom: 12px;
    background: #2a2a2a;
    overflow: hidden;
}

.step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
}

.step-header.static {
    cursor: default;
}

.step-header input[type=checkbox] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    flex-shrink: 0;
}

.step-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #4da3ff;
    color: #111;
    font-size: 13px;
    font-weight: bold;
    flex-shrink: 0;
}

.step-title {
    font-weight: bold;
    font-size: 15px;
}

.step-body {
    padding: 4px 16px 16px 48px;
    transition: opacity 0.2s;
}

.step-help {
    color: #aaa;
    font-size: 13px;
    margin: 4px 0 0;
}

.step.disabled .step-body {
    opacity: 0.35;
    pointer-events: none;
}

.slider-label {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

input[type=range] {
    width: 220px;
    flex: 1;
    min-width: 140px;
}

.filename-row {
    display: flex;
    align-items: center;
    gap: 6px;
}

input[type=text]#filename {
    flex: 1;
    padding: 8px 10px;
    font-size: 14px;
    border: 1px solid #666;
    border-radius: 4px;
    background: #333;
    color: white;
}

#filenameExt {
    color: #aaa;
    font-size: 14px;
    white-space: nowrap;
}

.size-info {
    color: #aaa;
    font-size: 13px;
    margin: 10px 0;
    min-height: 18px;
}

.size-info .smaller {
    color: #7be36b;
}

.size-info .bigger {
    color: #ff8f6b;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #4da3ff;
    color: #111;
    font-weight: bold;
    transition: background 0.2s, opacity 0.2s;
}

button:hover:not(:disabled) {
    background: #71b7ff;
}

button:disabled {
    background: #555;
    color: #999;
    cursor: not-allowed;
}

.status {
    min-height: 22px;
    color: #ffb84d;
    font-size: 14px;
}

.status.error {
    color: #ff6b6b;
}

.preview {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.canvas-wrap {
    display: inline-block;
    vertical-align: top;
    margin: 15px;
}

canvas {
    display: block;
    border: 1px solid #666;
    max-width: 100%;
    height: auto;
    background:
        linear-gradient(45deg,#bbb 25%,transparent 25%),
        linear-gradient(-45deg,#bbb 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#bbb 75%),
        linear-gradient(-45deg,transparent 75%,#bbb 75%);
    background-size:20px 20px;
    background-position:0 0,0 10px,10px -10px,-10px 0;
}

.dimensions {
    color: #aaa;
    font-size: 13px;
    margin-top: 4px;
}
</style>
</head>
<body>

<h2>Crop Transparent Borders</h2>
<p class="subtitle">Trim transparent padding and resize an image, right in your browser.</p>

<div class="dropzone" id="dropzone">
    <p>Drag &amp; drop an image here, or click to choose a file</p>
    <input type="file" id="file" accept="image/*">
</div>

<div class="pipeline">

    <section class="step" id="stepCrop">
        <label class="step-header">
            <input type="checkbox" id="cropEnabled" checked>
            <span class="step-number">1</span>
            <span class="step-title">Crop Transparent Borders</span>
        </label>
        <div class="step-body">
            <label class="slider-label">
                Alpha Threshold
                <input type="range" id="threshold" min="0" max="255" value="1">
                <span id="thresholdValue">1</span>
            </label>
        </div>
    </section>

    <section class="step disabled" id="stepResize">
        <label class="step-header">
            <input type="checkbox" id="resizeEnabled">
            <span class="step-number">2</span>
            <span class="step-title">Resize</span>
        </label>
        <div class="step-body">
            <label class="slider-label">
                Max Size (px)
                <input type="range" id="resizeSlider" min="1" max="1" value="1" disabled>
                <span id="resizeValue">-</span>
            </label>
        </div>
    </section>

    <section class="step" id="stepOutput">
        <div class="step-header static">
            <span class="step-number">3</span>
            <span class="step-title">Output</span>
        </div>
        <div class="step-body">
            <div class="filename-row">
                <input type="text" id="filename" placeholder="cropped" disabled>
                <span id="filenameExt"></span>
            </div>
            <div class="size-info" id="sizeInfo"></div>
            <button id="downloadBtn" disabled>Download</button>
        </div>
    </section>

</div>

<p class="status" id="status"></p>

<div class="preview">
    <div class="canvas-wrap">
        <h3>Original</h3>
        <canvas id="source"></canvas>
        <div class="dimensions" id="sourceDims"></div>
    </div>

    <div class="canvas-wrap">
        <h3>Result</h3>
        <canvas id="output"></canvas>
        <div class="dimensions" id="outputDims"></div>
    </div>
</div>

<script>
(() => {
    const fileInput = document.getElementById("file");
    const dropzone = document.getElementById("dropzone");
    const sourceCanvas = document.getElementById("source");
    const outputCanvas = document.getElementById("output");
    const statusEl = document.getElementById("status");
    const sourceDims = document.getElementById("sourceDims");
    const outputDims = document.getElementById("outputDims");
    const filenameInput = document.getElementById("filename");
    const filenameExt = document.getElementById("filenameExt");
    const downloadBtn = document.getElementById("downloadBtn");
    const sizeInfo = document.getElementById("sizeInfo");

    const stepCrop = document.getElementById("stepCrop");
    const cropEnabled = document.getElementById("cropEnabled");
    const thresholdSlider = document.getElementById("threshold");
    const thresholdValue = document.getElementById("thresholdValue");

    const stepResize = document.getElementById("stepResize");
    const resizeEnabled = document.getElementById("resizeEnabled");
    const resizeSlider = document.getElementById("resizeSlider");
    const resizeValue = document.getElementById("resizeValue");

    const srcCtx = sourceCanvas.getContext("2d", { willReadFrequently: true });
    const outCtx = outputCanvas.getContext("2d");

    // Offscreen canvas holding the result of the crop step (or the full image,
    // if cropping is disabled), before the resize step scales it down.
    const cropStageCanvas = document.createElement("canvas");
    const cropStageCtx = cropStageCanvas.getContext("2d");

    // Canvas can only reliably re-encode to these formats; anything else falls back to PNG.
    const SUPPORTED_EXPORT_TYPES = {
        "image/png": "png",
        "image/jpeg": "jpg",
        "image/webp": "webp"
    };

    let loaded = false;
    let objectUrl = null;
    let exportBaseMimeType = "image/png";
    let originalFileSize = 0;
    let cropUpdateTimer = null;
    let sizeUpdateTimer = null;
    let pipelineToken = 0;

    function canvasToBlob(canvas, mimeType, quality) {
        return new Promise(resolve => canvas.toBlob(resolve, mimeType, quality));
    }

    function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
    }

    function setStepEnabled(stepEl, toggleInput, enabled) {
        stepEl.classList.toggle("disabled", !enabled);
        for (const input of stepEl.querySelectorAll(".step-body input")) {
            input.disabled = !enabled;
        }
    }

    function formatSize(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
    }

    function resetOutput() {
        outputCanvas.width = 0;
        outputCanvas.height = 0;
        cropStageCanvas.width = 0;
        cropStageCanvas.height = 0;
        outputDims.textContent = "";
        sizeInfo.textContent = "";
        downloadBtn.disabled = true;
    }

    // Step 1: crop transparent borders (or pass the full image through untouched).
    function runCropStage() {
        if (!loaded) return;

        const width = sourceCanvas.width;
        const height = sourceCanvas.height;

        if (!cropEnabled.checked) {
            cropStageCanvas.width = width;
            cropStageCanvas.height = height;
            cropStageCtx.clearRect(0, 0, width, height);
            cropStageCtx.drawImage(sourceCanvas, 0, 0);
            setStatus("");
            resetResizeBounds(width, height);
            renderFinal();
            return;
        }

        const threshold = Number(thresholdSlider.value);

        let pixels;
        try {
            pixels = srcCtx.getImageData(0, 0, width, height);
        } catch (err) {
            setStatus("Could not read image data (the image may be from a restricted source).", true);
            return;
        }

        const data = pixels.data;

        let minX = width;
        let minY = height;
        let maxX = -1;
        let maxY = -1;

        for (let y = 0; y < height; y++) {
            const rowOffset = y * width;
            for (let x = 0; x < width; x++) {
                const alpha = data[(rowOffset + x) * 4 + 3];

                if (alpha > threshold) {
                    if (x < minX) minX = x;
                    if (y < minY) minY = y;
                    if (x > maxX) maxX = x;
                    if (y > maxY) maxY = y;
                }
            }
        }

        if (maxX === -1) {
            setStatus("Image is completely transparent at this threshold — nothing to crop.", true);
            resetOutput();
            return;
        }

        const cropWidth = maxX - minX + 1;
        const cropHeight = maxY - minY + 1;

        cropStageCanvas.width = cropWidth;
        cropStageCanvas.height = cropHeight;
        cropStageCtx.clearRect(0, 0, cropWidth, cropHeight);
        cropStageCtx.drawImage(
            sourceCanvas,
            minX, minY, cropWidth, cropHeight,
            0, 0, cropWidth, cropHeight
        );

        if (minX === 0 && minY === 0 && maxX === width - 1 && maxY === height - 1) {
            setStatus("No transparent borders found — image was already tight.");
        } else {
            setStatus("Cropped successfully.");
        }

        resetResizeBounds(cropWidth, cropHeight);
        renderFinal();
    }

    function scheduleCropUpdate() {
        clearTimeout(cropUpdateTimer);
        cropUpdateTimer = setTimeout(runCropStage, 120);
    }

    // Resets the resize slider's range to match the current pre-resize size,
    // defaulting to "no scale" whenever the upstream (crop) stage changes.
    function resetResizeBounds(width, height) {
        const maxDim = Math.max(width, height);
        resizeSlider.min = Math.min(50, maxDim);
        resizeSlider.max = maxDim;
        resizeSlider.value = maxDim;
        resizeValue.textContent = maxDim;
    }

    // Step 2: resize (or pass the crop-stage image through at native size).
    function renderFinal() {
        if (cropStageCanvas.width === 0) return;

        const maxDim = Math.max(cropStageCanvas.width, cropStageCanvas.height);
        const targetMax = resizeEnabled.checked ? Number(resizeSlider.value) : maxDim;
        const scale = Math.min(1, targetMax / maxDim);
        const outWidth = Math.max(1, Math.round(cropStageCanvas.width * scale));
        const outHeight = Math.max(1, Math.round(cropStageCanvas.height * scale));

        outputCanvas.width = outWidth;
        outputCanvas.height = outHeight;
        outCtx.clearRect(0, 0, outWidth, outHeight);
        outCtx.drawImage(
            cropStageCanvas,
            0, 0, cropStageCanvas.width, cropStageCanvas.height,
            0, 0, outWidth, outHeight
        );

        outputDims.textContent = `${outWidth} x ${outHeight}px`;
        downloadBtn.disabled = false;

        scheduleSizeUpdate();
    }

    // Export in the original source format, losslessly where the format allows it.
    async function getExportResult() {
        const blob = await canvasToBlob(outputCanvas, exportBaseMimeType, 1);
        return { blob, ext: SUPPORTED_EXPORT_TYPES[exportBaseMimeType] };
    }

    function scheduleSizeUpdate() {
        clearTimeout(sizeUpdateTimer);
        sizeUpdateTimer = setTimeout(updateSizeComparison, 150);
    }

    async function updateSizeComparison() {
        if (outputCanvas.width === 0) return;

        const token = ++pipelineToken;
        const result = await getExportResult();
        if (token !== pipelineToken) return; // a newer change has superseded this one

        if (!result || !result.blob) {
            sizeInfo.textContent = "";
            return;
        }

        filenameExt.textContent = `.${result.ext}`;

        let comparison = "";
        if (originalFileSize > 0) {
            const pct = Math.round((result.blob.size / originalFileSize) * 100);
            const cls = result.blob.size < originalFileSize ? "smaller" : "bigger";
            comparison = ` (<span class="${cls}">${pct}% of original</span>)`;
        }

        sizeInfo.innerHTML =
            `Original: ${formatSize(originalFileSize)} &rarr; Output: ${formatSize(result.blob.size)}${comparison}`;
    }

    cropEnabled.onchange = () => {
        setStepEnabled(stepCrop, cropEnabled, cropEnabled.checked);
        runCropStage();
    };

    thresholdSlider.oninput = () => {
        thresholdValue.textContent = thresholdSlider.value;
        scheduleCropUpdate();
    };

    resizeEnabled.onchange = () => {
        setStepEnabled(stepResize, resizeEnabled, resizeEnabled.checked);
        renderFinal();
    };

    resizeSlider.oninput = () => {
        resizeValue.textContent = resizeSlider.value;
        renderFinal();
    };

    function loadFile(file) {
        if (!file) return;

        if (!file.type.startsWith("image/")) {
            setStatus("Please choose a valid image file.", true);
            return;
        }

        if (objectUrl) {
            URL.revokeObjectURL(objectUrl);
        }

        const img = new Image();
        objectUrl = URL.createObjectURL(file);

        img.onload = () => {
            sourceCanvas.width = img.width;
            sourceCanvas.height = img.height;
            srcCtx.clearRect(0, 0, img.width, img.height);
            srcCtx.drawImage(img, 0, 0);
            sourceDims.textContent = `${img.width} x ${img.height}px`;
            loaded = true;
            resetOutput();

            originalFileSize = file.size;
            exportBaseMimeType = SUPPORTED_EXPORT_TYPES[file.type] ? file.type : "image/png";

            const baseName = file.name.replace(/\.[^./\\]+$/, "") || "image";
            filenameInput.value = `${baseName}_cropped`;
            filenameInput.disabled = false;
            filenameExt.textContent = `.${SUPPORTED_EXPORT_TYPES[exportBaseMimeType]}`;

            runCropStage();
        };

        img.onerror = () => {
            setStatus("Could not load that image. It may be corrupt or an unsupported format.", true);
            loaded = false;
        };

        img.src = objectUrl;
    }

    fileInput.onchange = e => {
        loadFile(e.target.files[0]);
    };

    dropzone.onclick = () => fileInput.click();

    dropzone.ondragover = e => {
        e.preventDefault();
        dropzone.classList.add("dragover");
    };

    dropzone.ondragleave = () => {
        dropzone.classList.remove("dragover");
    };

    dropzone.ondrop = e => {
        e.preventDefault();
        dropzone.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (file) loadFile(file);
    };

    downloadBtn.onclick = async () => {
        if (outputCanvas.width === 0) return;

        downloadBtn.disabled = true;
        try {
            const result = await getExportResult();
            if (!result || !result.blob) {
                setStatus("Could not export the image.", true);
                return;
            }

            const typedName = filenameInput.value.trim().replace(/[\\/:*?"<>|]/g, "");
            const baseName = typedName || "cropped";

            const url = URL.createObjectURL(result.blob);
            const a = document.createElement("a");
            a.download = `${baseName}.${result.ext}`;
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
        } finally {
            downloadBtn.disabled = false;
        }
    };
})();
</script>

</body>
</html>
